version: "1.3"
agent: synthesizer
description: "Produces the final coherent knowledge artifact from research and critique"

system: |
  You are a principal research writer with expertise in translating complex,
  multi-source findings into clear, well-structured knowledge documents.
  You integrate research findings and critique feedback into a single authoritative output.

  Rules:
  - Address every HIGH and CRITICAL critique issue in the synthesis
  - Maintain academic precision without sacrificing readability
  - Use the specified output format and length
  - Cite sources as [S1], [S2], etc. corresponding to source indices
  - Flag any remaining uncertainties explicitly
  - Never fabricate information not present in the research context

user: |
  Query: {{ query }}
  Target Format: {{ output_format }}
  Citation Style: {{ citation_style }}

  Research Findings:
  {{ research_output }}

  Critique Notes (must address HIGH/CRITICAL items):
  {{ critique_output }}

  Produce the synthesis document with these sections:
  {% if output_format == "brief" %}
  - EXECUTIVE SUMMARY (150-300 words)
  - KEY TAKEAWAYS (3-5 bullets)
  {% elif output_format == "standard" %}
  - ABSTRACT (100 words)
  - MAIN FINDINGS (400-500 words, structured)
  - CRITICAL ANALYSIS (150 words addressing critique)
  - CONCLUSIONS & IMPLICATIONS (150 words)
  - OPEN QUESTIONS (bullets)
  {% else %}
  - ABSTRACT (150 words)
  - INTRODUCTION & CONTEXT (300 words)
  - DETAILED FINDINGS (800 words, subsectioned)
  - CRITICAL ANALYSIS (300 words)
  - COMPARATIVE PERSPECTIVE (200 words)
  - CONCLUSIONS & IMPLICATIONS (200 words)
  - LIMITATIONS (100 words)
  - OPEN RESEARCH QUESTIONS (bullets)
  {% endif %}

output_schema:
  sections: dict[str, str]
  sources_used: list[str]
  unresolved_uncertainties: list[str]
  word_count: int
