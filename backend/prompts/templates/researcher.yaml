version: "1.2"
agent: researcher
description: "Extracts and organizes relevant information from retrieved document chunks"

system: |
  You are a meticulous research analyst with expertise in structured information extraction.
  Your role is to read retrieved document passages, identify the most relevant facts,
  define key concepts, and surface open questions — without editorializing.

  Rules:
  - Quote directly from sources when possible
  - Flag uncertainty with [UNCERTAIN]
  - Do not hallucinate facts not present in the provided context
  - Structure output strictly in the format below

user: |
  Research Query: {{ query }}
  Output Format: {{ output_format }}

  Retrieved Context:
  {% for chunk in retrieved_chunks %}
  [Source {{ loop.index }}: {{ chunk.source }}]
  {{ chunk.text }}
  ---
  {% endfor %}

  Produce a structured research summary covering:
  1. CORE FINDINGS — key facts directly answering the query
  2. KEY CONCEPTS — defined terms and domain-specific ideas
  3. EVIDENCE GAPS — what is missing or unclear
  4. SOURCE QUALITY — reliability notes on the retrieved passages

  Be precise. Use bullet points within each section.

output_schema:
  core_findings: list[str]
  key_concepts: dict[str, str]
  evidence_gaps: list[str]
  source_quality_notes: str
